# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Deploy to Staging

on:
  push:
    branches: 
      - 'feat/*'
      - 'feature/*'
      - 'dev/*'
      - 'staging/*'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to deploy to staging'
        required: true
        default: 'main'

env:
  AZURE_FUNCTIONAPP_NAME: 'ioe-function'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref_name }}

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install quality tools and dependencies
        run: |
          source venv/bin/activate
          pip install black ruff mypy pytest pytest-cov bandit
          pip install -r requirements.txt

      - name: Run quality checks
        run: |
          source venv/bin/activate
          echo "🔍 Running code quality checks..."
          
          echo "📏 Checking code format..."
          black --check --line-length 100 . || echo "⚠️ Format check failed"
          
          echo "🔧 Running linter..."
          ruff check af_code/ || echo "⚠️ Lint check failed"
          
          echo "🏷️ Type checking..."
          mypy af_code/ || echo "⚠️ Type check failed"
          
          echo "🛡️ Security scan..."
          bandit -r af_code/ || echo "⚠️ Security check failed"
          
          echo "🧪 Running tests (if any exist)..."
          pytest af_code/ --verbose || echo "⚠️ No tests found or tests failed"
          
          echo "✅ Quality checks completed"

  deploy-staging:
    runs-on: ubuntu-latest
    needs: [build, quality-checks]
    permissions:
      contents: read
    environment:
      name: 'Staging'
      url: 'https://ioe-function-staging-ctaxc3d3hyf0hxda.eastus2-01.azurewebsites.net'

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip

      - name: 'Deploy to Azure Functions Staging'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          slot-name: 'staging'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_STAGING_FUNCTION_PUBLISH_PROFILE }}

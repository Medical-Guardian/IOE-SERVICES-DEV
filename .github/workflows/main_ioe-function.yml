# Docs for the Azure Web Apps Deploy action: https://github.com/azure/functions-action
# More GitHub Actions for Azure: https://github.com/Azure/actions
# More info on Python, GitHub Actions, and Azure Functions: https://aka.ms/python-webapps-actions

name: Build and deploy Python project to Azure Function App - IOE-function

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.' # set this to the path to your web app project, defaults to the repository root
  PYTHON_VERSION: '3.12' # set this to the python version to use (supports 3.6, 3.7, 3.8)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Optional: Add step to run tests here

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python version
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Create and start virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install quality tools and dependencies
        run: |
          source venv/bin/activate
          pip install black ruff mypy pytest pytest-cov bandit
          pip install -r requirements.txt

      - name: Run quality checks
        run: |
          source venv/bin/activate
          echo "🔍 Running code quality checks..."
          
          echo "📏 Checking code format..."
          black --check --line-length 100 . || echo "❌ Format check failed"
          
          echo "🔧 Running linter..."
          ruff check af_code/ || echo "❌ Lint check failed"
          
          echo "🏷️ Type checking..."
          mypy af_code/ || echo "❌ Type check failed"
          
          echo "🛡️ Security scan..."
          bandit -r af_code/ || echo "❌ Security check failed"
          
          echo "🧪 Running tests (if any exist)..."
          pytest af_code/ --verbose || echo "❌ No tests found or tests failed"
          
          echo "✅ Quality checks completed"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, quality-checks]
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: Unzip artifact for deployment
        run: |
          unzip release.zip
          rm release.zip
        
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4BEAA456D18F43D0B7A6335EE923FE1A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A305A799263047CEBB6CF2C7EA387A21 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8808712E9E774042A74273B056C5413B }}

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        id: deploy-to-function
        with:
          app-name: 'IOE-function'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          
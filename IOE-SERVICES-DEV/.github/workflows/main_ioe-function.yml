name: Build and deploy Python project to Azure Function App - IOE-function

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  PYTHON_VERSION: '3.12'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m venv venv
          source venv/bin/activate
      - run: pip install -r requirements.txt
      - run: zip release.zip ./* -r
      - uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: |
            release.zip
            !venv/

  quality-checks:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          python -m venv venv
          source venv/bin/activate
      - run: |
          source venv/bin/activate
          pip install black ruff mypy pytest pytest-cov bandit
          pip install -r requirements.txt
      - run: |
          source venv/bin/activate
          black --check --line-length 100 . || echo "format issues"
          ruff check af_code/ || echo "lint issues"
          mypy af_code/ || echo "type issues"
          bandit -r af_code/ || echo "security issues"
          pytest af_code/ --verbose || echo "tests failed or none"

  deploy:
    runs-on: ubuntu-latest
    needs: [build, quality-checks]
    permissions:
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-app
      - run: |
          unzip release.zip
          rm release.zip
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'IOE-function'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZURE_PROD_FUNCTION_PUBLISH_PROFILE }}
